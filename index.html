<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello There!</title>
    <style>
        /* Soft, pastel vibes */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fff0f5; /* Lavender Blush */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d5d5d;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 1rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #ffb6c1; /* Light Pink */
        }

        p {
            line-height: 1.6;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background-color: #ffb6c1;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #ff9aa2;
        }

        /* A little floating animation for the emoji */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✨</div>
        <h1>Welcome!</h1>
        <p>This is a simple, cozy space on the internet. Thanks for stopping by!</p>
        <a href="#" class="btn">Say Hi</a>
    </div>

</body>
</html>
